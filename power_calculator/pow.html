<!DOCTYPE html> <!-- Power Calculator -->
<html lang="en">

<head>
  <link href='https://fonts.googleapis.com/css?family=Lexend Deca' rel='stylesheet'> <!-- Lexend Deca -->

  <!-- Favicons -->
  <link href="favicons/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
  <link href="favicons/favicon-32x32.png" rel="icon" type="image/png" sizes="32x32">
  <link href="favicons/favicon-16x16.png" rel="icon" type="image/png" sizes="16x16">
  <!-- Favicons -->

  <link id="theme" href="../css/light.css" rel="stylesheet">

<title>tigerros</title>
</head>
<body>

  <!-- All visible content -->
  <a href="https://tigerros.github.io" style="font-size: 40px; text-decoration: underline">tigerros</a><br>
  <p style="font-size: 25px">Power calculator</p>

  <p style="font-size: 17px">Base number</p>
  <input type="number" id="base"><br>

  <p style="font-size: 17px">Exponent</p>
  <input type="number" id="exponent"><br><br>

  <button onclick="resultFunc()" style="font-size: 20px">Calculate</button><br>
  <p style="font-size: 17px" id="result"></p>

  <button class="dark" onclick="darkTheme()" style="font-size: 15px; padding: 10px">Dark Theme</button>
  <button class="light" onclick="lightTheme()" style="font-size: 15px; padding: 10px">Light Theme</button>

  <footer>
    <a href='../index.html' style="background-color: #15151515; padding: 0px 0px; text-decoration: underline">Jump to home page</a><br><br>
    <a href='power_calculator/index.html' style="background-color: #15151515; padding: 0px 0px; text-decoration: underline">Power calculator</a><!-- &emsp; -->
  </footer>
  <!-- All visible content -->

  <script>
  function powerFunc() { // Multiplies the "base" number to the power of the "exponent"
    var base = document.getElementById('base').value
    var exponent = document.getElementById('exponent').value

    return Math.pow(base, exponent)
  }

  function resultFunc() { // Uses powerFunc() to show the result
    var result = document.getElementById('result')

    result.innerHTML = powerFunc()
    console.log("Showed result")
  }

  var theme = document.getElementById('theme') // TODO: Toggle theme

  function darkTheme(){
    theme.href = '../css/dark.css'
  }

  function lightTheme(){
    theme.href = '../css/light.css'
  }

  </script>

</body>
</html>
